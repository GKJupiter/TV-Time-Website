{% extends 'tracker/base.html' %}
{% block content %}
<div style="text-align:center; margin-bottom:40px;">
    <h1 style="color:#ffeb3b; font-size:2.5em;">Search Shows</h1>
    <form style="display:flex; justify-content:center; gap:10px; margin-top:20px;" method="GET" action="/search/">
        <input type="text" name="q" value="{{ query }}" placeholder="Search show name..." style="padding:15px; border-radius:8px; width:60%; font-size:16px; background:#222; border:2px solid #333; color:#fff; outline:none;">
        <button type="submit" style="padding:15px 30px; background:#ffeb3b; color:#000; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">Search</button>
    </form>
</div>

<div class="grid">
    {% for item in results %}
    <div class="card" onclick="openModal('{{ item.show.id }}', '{{ item.show.name|escapejs }}', '{{ item.show.image.medium|default:'' }}', '{{ item.show.summary|escapejs }}')">
        {% if item.show.image.medium %}
        <img src="{{ item.show.image.medium }}" alt="{{ item.show.name }}">
        {% else %}
        <div style="height:300px; background:#222; display:flex; align-items:center; justify-content:center;">No Image</div>
        {% endif %}
        <div class="card-info">
            <div class="card-title">{{ item.show.name }}</div>
        </div>
    </div>
    {% empty %}
        {% if query %}
        <div style="grid-column: 1 / -1; text-align: center; color: #aaa;">No shows found.</div>
        {% endif %}
    {% endfor %}
</div>
{% endblock %}
